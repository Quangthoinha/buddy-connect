<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1.0 + user-scalable=no: chặn pinch zoom in/out trong WebView.
         Cần cho mini-app vì layout đã optimize cho mobile, zoom làm UI vỡ + iOS
         tự zoom focus input (auto-zoom on input focus) gây khó chịu. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FFF7F8" />
    <title>Mushy Mini-app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
